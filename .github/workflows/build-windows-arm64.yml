name: Build Windows ARM64

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-windows-arm64:
    runs-on: windows-11-arm  
    defaults:
        run:
            shell: msys2 {0}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: false  # We'll update in our script
        install: base-devel git
    
    - name: Setup build environment
      run: |
        # Make scripts executable
        chmod +x ./scripts/setup-env.sh
        chmod +x ./scripts/build-windows-arm64.sh
        chmod +x ./scripts/verify-build.sh
        chmod +x ./scripts/create-release-package.sh
        
        # Run our environment setup script
        ./scripts/setup-env.sh
    
    - name: Build Vectorscan for Windows ARM64
      run: |
        ./scripts/build-windows-arm64.sh
    
    - name: Verify build artifacts
      run: |
        ./scripts/verify-build.sh
    
    - name: Test Hyperscan
      run: |
        set -e
        echo "Running Hyperscan tests..."
        ./build-windows-arm64/bin/unit-hyperscan.exe
        echo "✓ Hyperscan tests completed successfully"
    
    - name: Create release package
      run: |
        ./scripts/create-release-package.sh
    
    - name: Upload release package
      uses: actions/upload-artifact@v4
      with:
        name: vectorscan-windows-arm64-release
        path: vectorscan-windows-arm64.tar.gz
        retention-days: 90
